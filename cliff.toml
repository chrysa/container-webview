# ─────────────────────────────────────────────────────────────────────────────
# git-cliff configuration
# Docs: https://git-cliff.org/docs/configuration
#
# Generates a CHANGELOG.md from conventional commits.
# ─────────────────────────────────────────────────────────────────────────────

[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
### {{ group | upper_first }}

{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.breaking %} ⚠️ **BREAKING CHANGE**{% endif %}

{% endfor %}
{% endfor %}\
"""

footer = """
<!-- generated by [git-cliff](https://git-cliff.org) -->
"""

trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
  { message = "^feat",                     group = "Features"       },
  { message = "^fix",                      group = "Bug Fixes"      },
  { message = "^perf",                     group = "Performance"    },
  { message = "^refactor",                 group = "Refactoring"    },
  { message = "^docs?",                    group = "Documentation"  },
  { message = "^style",                    group = "Styling"        },
  { message = "^test",                     group = "Testing"        },
  { message = "^build",                    group = "Build System"   },
  { message = "^(ci|cd)",                  group = "CI/CD"          },
  # Skip auto-generated release commits so they don't appear in the changelog
  { message = "^chore\\(release\\)",       skip  = true             },
  { message = "\\[skip ci\\]",             skip  = true             },
  { message = "^chore",                    group = "Miscellaneous"  },
]

filter_commits = false
tag_pattern    = "v[0-9].*"
skip_tags      = ""
ignore_tags    = ""
topo_order     = false
sort_commits   = "oldest"

# Link commits to their GitHub diff page
[remote.github]
owner = "chrysa"
repo  = "container-webview"
