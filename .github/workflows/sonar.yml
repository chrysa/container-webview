---
name: SonarCloud Analysis

on:
    push:
        branches:
            - main
            - master
            - develop
    pull_request:
        types:
            - opened
            - synchronize
            - reopened

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: read

jobs:
    sonar:
        if: github.actor != 'dependabot[bot]'
        name: SonarCloud scan
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.3
              with:
                  fetch-depth: 0

            - name: Download API coverage
              uses: actions/download-artifact@v8
              with:
                  name: api-coverage
                  path: api/
              continue-on-error: true

            - name: Download frontend coverage
              uses: actions/download-artifact@v8
              with:
                  name: frontend-coverage
                  path: code/coverage/
              continue-on-error: true

            - name: List available reports
              run: |
                  ls -lh api/coverage.xml 2>/dev/null || echo "api/coverage.xml missing"
                  ls -lh code/coverage/lcov.info 2>/dev/null || echo "code/coverage/lcov.info missing"

            - name: SonarCloud scan
              # sonar-project.properties defines sources, coverage paths, etc.
              uses: SonarSource/sonarqube-scan-action@v8.1.0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
