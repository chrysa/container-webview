---
# Thin caller of the generalized chrysa lean CI (fullstack monorepo).
# Gate = make pre-commit; tests = make docker-test; sonar. Auto-versioning in release.yml.

name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main, "feat/**", "fix/**", "chore/**", "ci/**"]
    workflow_dispatch:

permissions:
    contents: read
    checks: write
    pull-requests: write

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        uses: chrysa/github-actions/.github/workflows/ci-fullstack.yml@main
        with:
            project-key: chrysa_container-webview
            project-name: container-webview
            test-target: docker-test
        secrets: inherit
