---
# ─────────────────────────────────────────────────────────────────────────────
# CI — Lint + Build
# Déclenché sur tous les push et pull requests.
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
    push:
        branches: ['**']
    pull_request:
        branches: ['**']

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
    lint-frontend:
        name: Lint — TypeScript / ESLint
        runs-on: ubuntu-latest
        steps:
        -   uses: actions/checkout@v4

        -   name: Setup Node 22
            uses: actions/setup-node@v4
            with:
                node-version: '22'
                cache: npm
                cache-dependency-path: code/package.json

        -   name: Install dependencies
            working-directory: code
            run: npm install --legacy-peer-deps

        -   name: Run ESLint
            working-directory: code
            run: npm run lint

  # ───────────────────────────────────────────────────────────────────────────
    lint-api:
        name: Lint — Python / Ruff
        runs-on: ubuntu-latest
        steps:
        -   uses: actions/checkout@v4

        -   name: Setup Python 3.12
            uses: actions/setup-python@v5
            with:
                python-version: '3.12'
                cache: pip
                cache-dependency-path: api/requirements.txt

        -   name: Install ruff
            run: pip install ruff==0.11.2

        -   name: Run ruff check
            run: ruff check api/

        -   name: Run ruff format check
            run: ruff format --check api/

  # ───────────────────────────────────────────────────────────────────────────
    build-frontend:
        name: Build — Frontend (Vite)
        runs-on: ubuntu-latest
        needs: [lint-frontend]
        steps:
        -   uses: actions/checkout@v4

        -   name: Setup Node 22
            uses: actions/setup-node@v4
            with:
                node-version: '22'
                cache: npm
                cache-dependency-path: code/package.json

        -   name: Install dependencies
            working-directory: code
            run: npm install --legacy-peer-deps

        -   name: Build
            working-directory: code
            env:
                VITE_API_URL: ''
            run: npm run build

        -   name: Upload build artifact
            uses: actions/upload-artifact@v4
            with:
                name: frontend-dist
                path: code/dist/
                retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
    build-docker-api:
        name: Build — Docker API
        runs-on: ubuntu-latest
        needs: [lint-api]
        steps:
        -   uses: actions/checkout@v4

        -   name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3

        -   name: Build API image (no push)
            uses: docker/build-push-action@v6
            with:
                context: ./api
                push: false
                tags: ghcr.io/${{ github.repository_owner }}/container-webview/api:${{ github.sha }}
                cache-from: type=gha
                cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────────────────
    build-docker-frontend:
        name: Build — Docker Frontend
        runs-on: ubuntu-latest
        needs: [lint-frontend]
        steps:
        -   uses: actions/checkout@v4

        -   name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3

        -   name: Build Frontend image (no push)
            uses: docker/build-push-action@v6
            with:
                context: .
                push: false
                build-args: VITE_API_URL=
                tags: ghcr.io/${{ github.repository_owner }}/container-webview/frontend:${{ github.sha }}
                cache-from: type=gha
                cache-to: type=gha,mode=max
