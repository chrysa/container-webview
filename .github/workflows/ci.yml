---
# ─────────────────────────────────────────────────────────────────────────────
# CI — Lint + Build
# Déclenché sur tous les push et pull requests.
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "ci/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - uses: pre-commit/action@v3.0.1
        env:
          SKIP: no-commit-to-branch

  # ───────────────────────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint — TypeScript / ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: code/package.json

      - name: Install dependencies
        working-directory: code
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        working-directory: code
        run: npm run lint

  # ───────────────────────────────────────────────────────────────────────────
  lint-api:
    name: Lint — Python / Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: chrysa/github-actions/python-setup@v1
        with:
          python-version: "3.14"

      - name: Install project dependencies
        working-directory: api
        run: pip install -e '.[dev]'

      - uses: chrysa/github-actions/ruff-check@v1
        with:
          python-version: "3.14"
          latest-python: "3.14"
          config: api/pyproject.toml
          sources: api

  # ───────────────────────────────────────────────────────────────────────────
  mypy-api:
    name: Mypy — Python
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: chrysa/github-actions/python-setup@v1
        with:
          python-version: "3.14"

      - name: Install project dependencies
        working-directory: api
        run: pip install -e '.[dev]'

      - uses: chrysa/github-actions/mypy-check@v1
        with:
          python-version: "3.14"
          latest-python: "3.14"
          config-file: api/pyproject.toml
          sources: app

  # ───────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build — Frontend (Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: code/package.json

      - name: Install dependencies
        working-directory: code
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: code
        env:
          VITE_API_URL: ""
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: code/dist/
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  build-docker-api:
    name: Build — Docker API
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint-api]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API image (no push)
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/container-webview/api:${{
            github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────────────────
  build-docker-frontend:
    name: Build — Docker Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Frontend image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          build-args: VITE_API_URL=
          tags:
            ghcr.io/${{ github.repository_owner }}/container-webview/frontend:${{
            github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────────────────
  test-api:
    name: Tests — Python (pytest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint-api]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API test image
        run: docker compose build api-test
        env:
          COMPOSE_PROFILES: test

      - name: Run pytest with coverage
        run: >
          docker compose --profile test run --rm api-test python -m
          pytest --cov=app --cov-report=xml --cov-report=term-missing
        env:
          SECRET_KEY: test-secret-key-for-ci
          ADMIN_USERNAME: testuser
          ADMIN_PASSWORD: testpass

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: api-coverage
          path: api/coverage.xml
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Tests — Frontend (Vitest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: code/package.json

      - name: Install dependencies
        working-directory: code
        run: npm install --legacy-peer-deps

      - name: Run Vitest with coverage
        working-directory: code
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: code/coverage/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  test-e2e:
    name: Tests — E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-docker-api, build-docker-frontend]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: code/package.json

      - name: Install dependencies
        working-directory: code
        run: npm install --legacy-peer-deps

      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start stack (API + frontend)
        run: docker compose up -d api frontend
        env:
          VITE_API_URL: ""
          SECRET_KEY: e2e-secret-key-for-ci
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin

      - name: Wait for API healthcheck
        run: |
          for _i in $(seq 1 30); do
              curl -sf http://localhost:8000/api && break
              sleep 2
          done

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend at http://localhost:3000..."
          for _i in $(seq 1 60); do
              curl -sf http://localhost:3000 >/dev/null 2>&1 && echo "Frontend is ready" && break
              sleep 2
          done

      - name: Run Playwright E2E tests
        run: npx playwright test --config=playwright.config.ts
        env:
          BASE_URL: http://localhost:3000
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Stop stack
        if: always()
        run: docker compose down

  # ───────────────────────────────────────────────────────────────────────────
  sonar:
    if: github.actor != 'dependabot[bot]'
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-api, test-frontend]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download API coverage
        uses: actions/download-artifact@v8
        with:
          name: api-coverage
          path: api/
        continue-on-error: true

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage
          path: code/coverage/
        continue-on-error: true

      - name: List available reports
        run: |
          ls -lh api/coverage.xml 2>/dev/null || echo "api/coverage.xml missing"
          ls -lh code/coverage/lcov.info 2>/dev/null || echo "code/coverage/lcov.info missing"

      - name: SonarCloud scan
        # sonar-project.properties configures sources, coverage paths, etc.
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
