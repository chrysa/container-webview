---
name: Release

on:
    push:
        branches: [main, master]
        paths-ignore:
            - "**.md"
            - .github/**
    workflow_dispatch:

jobs:
    call:
        uses: chrysa/github-actions/.github/workflows/release.yml@main
        # The reusable workflow does not declare RELEASE_TOKEN in its
        # `workflow_call.secrets`, so passing it explicitly caused a
        # startup_failure ("workflow file issue"). Inherit instead: the callee
        # reads `secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN`.
        secrets: inherit
