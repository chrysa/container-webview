---
name: CD

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            tag:
                description: Image tag to build and push
                required: true
                default: latest

permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        name: Build & Push Docker Image
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: GitVersion
              id: gitversion
              uses: chrysa/github-actions/gitversion@main

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository_owner }}/container-webview-api
                  tags: |
                      type=semver,pattern={{version}},value=${{ steps.gitversion.outputs.semVer }}
                      type=semver,pattern={{major}}.{{minor}},value=${{ steps.gitversion.outputs.semVer }}
                      type=raw,value=latest,enable=${{ github.event_name == 'release' }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push API image
              uses: docker/build-push-action@v6
              with:
                  context: ./api
                  file: ./api/Dockerfile
                  target: prod
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  platforms: linux/amd64,linux/arm64
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      VERSION=${{ steps.gitversion.outputs.semVer }}

            - name: Summary
              run: |
                  echo "## CD Summary" >> "$GITHUB_STEP_SUMMARY"
                  echo "**Image:** \`ghcr.io/${{ github.repository_owner }}/container-webview-api:${{ steps.gitversion.outputs.semVer }}\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Tags published" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
