# ─────────────────────────────────────────────────────────────────────────────
# CD — Build & Publish Docker Image
#
# Triggered when a GitHub Release is published (by the release workflow).
# Builds the API Docker image, tags it with the release version,
# and pushes it to GitHub Container Registry (ghcr.io).
#
# Permissions: contents: read, packages: write
# ─────────────────────────────────────────────────────────────────────────────
name: CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build and push"
        required: true
        default: "latest"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Compute version ─────────────────────────────────────────────────
      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - name: Execute GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true

      # ── 3. Docker metadata ─────────────────────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/container-webview-api
          tags: |
            type=semver,pattern={{version}},value=${{ steps.gitversion.outputs.semVer }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.gitversion.outputs.semVer }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      # ── 4. Set up QEMU + Buildx ────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Login to GHCR ───────────────────────────────────────────────────
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Build and push ──────────────────────────────────────────────────
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.gitversion.outputs.semVer }}

      # ── 7. Summary ─────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "## CD Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`ghcr.io/${{ github.repository_owner }}/container-webview-api:${{ steps.gitversion.outputs.semVer }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Tags published" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
