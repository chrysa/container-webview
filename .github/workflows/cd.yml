# ─────────────────────────────────────────────────────────────────────────────
# CD — Build Docker + Push GHCR + Deploy K8s
# Déclenché uniquement sur push dans main.
#
# Secrets requis (GitHub → Settings → Secrets and variables → Actions) :
#   KUBE_CONFIG   — base64 du kubeconfig pour accéder au cluster K8s
#   KUBE_CONTEXT  — (optionnel) nom du contexte kubectl
# ─────────────────────────────────────────────────────────────────────────────
name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false   # ne pas annuler un déploiement en cours

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/container-webview/api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/container-webview/frontend

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  build-push-api:
    name: Build & Push — API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────────────────
  build-push-frontend:
    name: Build & Push — Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # VITE_API_URL vide = URLs relatives, Traefik proxifie /api
          build-args: VITE_API_URL=
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy — Kubernetes
    runs-on: ubuntu-latest
    needs: [build-push-api, build-push-frontend]
    environment:
      name: production
      # URL à adapter selon votre hostname Traefik (variable d'env DEPLOY_URL ou valeur fixe)
      url: ${{ vars.DEPLOY_URL || 'https://docker-overview.example.com' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Select kubectl context
        if: ${{ vars.KUBE_CONTEXT != '' }}
        run: kubectl config use-context "${{ vars.KUBE_CONTEXT }}"

      - name: Verify cluster connectivity
        run: kubectl cluster-info

      - name: Deploy via kustomize
        env:
          SHA: ${{ github.sha }}
          OWNER: ${{ github.repository_owner }}
        run: |
          SHORT_SHA="${SHA::7}"
          kubectl kustomize k8s/ \
            | sed "s|ghcr.io/${OWNER}/container-webview/api:latest|ghcr.io/${OWNER}/container-webview/api:${SHORT_SHA}|g" \
            | sed "s|ghcr.io/${OWNER}/container-webview/frontend:latest|ghcr.io/${OWNER}/container-webview/frontend:${SHORT_SHA}|g" \
            | kubectl apply -f -

      - name: Wait for rollout — API
        run: kubectl rollout status deployment/docker-overview-api -n docker-overview --timeout=120s

      - name: Wait for rollout — Frontend
        run: kubectl rollout status deployment/docker-overview-frontend -n docker-overview --timeout=120s
