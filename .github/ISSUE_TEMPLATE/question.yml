name: Question / Support
description: Ask a question about setup, usage, or configuration
title: "question: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check the [README](https://github.com/chrysa/container-webview/blob/main/README.md)
        and [existing issues](https://github.com/chrysa/container-webview/issues).

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Describe what you are trying to do or understand.
      placeholder: How do I...?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant context (environment, config, logs).
      placeholder: |
        - OS: Ubuntu 24.04
        - Docker version: 27.x
        - make version: ...

  - type: dropdown
    id: component
    attributes:
      label: Related component
      options:
        - API (FastAPI backend)
        - Frontend (React)
        - Docker / docker-compose
        - Makefile
        - CI/CD (GitHub Actions)
        - pre-commit hooks
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have read the README
          required: true
        - label: I have searched existing issues
          required: true
