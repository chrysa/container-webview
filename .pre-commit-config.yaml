---
default_language_version:
    python: python3.13
fail_fast: false
minimum_pre_commit_version: 4.1.0

repos:
    # ─── General file checks (run first to fix encoding/whitespace) ───────────
-   repo: https://github.com/sirosen/texthooks
    rev: 0.7.1
    hooks:
    -   id: fix-smartquotes
    -   id: fix-spaces

-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-merge-conflict
        name: Check for merge conflicts
    -   id: check-yaml
        name: Validate YAML
        args: [--allow-multiple-documents]
        exclude: ^(\.github/ISSUE_TEMPLATE/)
        files: \.(yaml|yml)$
    -   id: check-json
        name: Validate JSON
        exclude: ^code/tsconfig
    -   id: check-case-conflict
    -   id: check-added-large-files
        name: Check for large files
        args: [--maxkb=500]
    -   id: end-of-file-fixer
        name: Fix end of files
    -   id: mixed-line-ending
        args: [--fix=lf]
    -   id: pretty-format-json
        args: [--indent=4, --autofix]
        exclude: ^code/
    -   id: trailing-whitespace
        name: Trim trailing whitespace
    -   id: no-commit-to-branch
        args: [--branch, main]

    # ─── Debug Detection ──────────────────────────────────────────────────────
-   repo: https://github.com/chrysa/pre-commit-tools
    rev: v0.1.1-58
    hooks:
    -   id: console-debug-detection
        name: Detect console.debug
    -   id: console-log-detection
        name: Detect console.log
        exclude: ^code/src/serviceWorker\.js$
    -   id: console-table-detection
        name: Detect console.table
    -   id: yaml-sorter
        name: Sort YAML files
        exclude: ^(\.config/|\.github/ISSUE_TEMPLATE/|\.github/workflows/|\.github/dependabot\.yml|docker-compose\.yml|k8s/|\.pre-commit-config\.yaml|GitVersion\.yml|\.github/FUNDING\.yml)

    # ─── Dockerfile ───────────────────────────────────────────────────────────
-   repo: https://github.com/AleksaC/hadolint-py
    rev: v2.14.0
    hooks:
    -   id: hadolint
        name: Lint Dockerfile frontend
        args: [-c, config-tools/.hadolint.yaml]
        files: ^Dockerfile$
    -   id: hadolint
        name: Lint Dockerfile api
        args: [-c, config-tools/.hadolint.yaml]
        files: ^api/Dockerfile$

    # ─── Python (API — FastAPI) ────────────────────────────────────────────────
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
    -   id: ruff-format
        name: Format Python (ruff)
        files: ^api/.*\.py$
    -   id: ruff
        name: Lint Python (ruff)
        args: [--fix, --exit-non-zero-on-fix]
        files: ^api/.*\.py$

-   repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
    -   id: python-no-eval
    -   id: python-no-log-warn
    -   id: python-use-type-annotations
    -   id: python-check-mock-methods

    # ─── TypeScript / JavaScript (Frontend — React 19 + Vite) ─────────────────
-   repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
    -   id: prettier
        name: Format code with Prettier
        files: ^code/.*\.(css|scss|ts|tsx|json)$
        exclude: ^code/package(-lock)?\.json$
        args:
        -   --print-width=120
        -   --tab-width=2
        -   --use-tabs=false
        -   --single-quote
        -   --trailing-comma=es5
        additional_dependencies:
        -   prettier@^3.0.0
        -   prettier-plugin-organize-imports@^3.2.0

-   repo: https://github.com/pre-commit/mirrors-eslint
    rev: v10.3.0
    hooks:
    -   id: eslint
        name: ESLint (TypeScript/React)
        files: ^code/.*\.(ts|tsx)$
        args: [--fix, --max-warnings=0, --config, code/eslint.config.js]
        additional_dependencies:
        -   eslint@^9.15.0
        -   '@eslint/js@^9.15.0'
        -   globals@^15.0.0
        -   '@typescript-eslint/eslint-plugin@^8.59.0'
        -   '@typescript-eslint/parser@^8.0.0'
        -   typescript-eslint@^8.0.0
        -   eslint-plugin-react@^7.37.0
        -   eslint-plugin-react-hooks@^5.0.0
        -   eslint-plugin-react-refresh@^0.4.14

    # ─── YAML ─────────────────────────────────────────────────────────────────
-   repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
    -   id: yamllint
        args: [--config-file, config-tools/.yamllint.yaml, --format, parsable, --strict]
        exclude: ^(\.github/ISSUE_TEMPLATE/)

-   repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
    rev: 0.2.3
    hooks:
    -   id: yamlfmt
        args: [--mapping, '4', --sequence, '4', --offset, '0', --width, '200']
        exclude: ^(\.config/|\.github/ISSUE_TEMPLATE/|\.github/workflows/|k8s/|GitVersion\.yml|\.github/FUNDING\.yml|\.github/dependabot\.yml|\.pre-commit-config\.yaml|docker-compose\.yml)

    # ─── Markdown ─────────────────────────────────────────────────────────────
-   repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
    -   id: markdownlint
        args: [-c, config-tools/.markdownlint.yml, --fix]
        exclude: ^CLAUDE\.md$

    # ─── Shell ────────────────────────────────────────────────────────────────
-   repo: https://github.com/lovesegfault/beautysh.git
    rev: v6.4.3
    hooks:
    -   id: beautysh
        args: [--indent-size, '4']

-   repo: https://github.com/openstack/bashate.git
    rev: 2.1.1
    hooks:
    -   id: bashate
        args:
        -   --ignore=E006,E020

    # ─── GitHub Actions ───────────────────────────────────────────────────────
-   repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
    -   id: actionlint
        name: Lint GitHub Actions workflows

    # ─── Security ─────────────────────────────────────────────────────────────
-   repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
    -   id: gitleaks
        name: Detect secrets

    # ─── Python type check ────────────────────────────────────────────────────
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
    -   id: mypy
        files: ^api/
        additional_dependencies:
            - "pydantic>=2.7"
            - "pydantic-settings>=2.3"
            - "fastapi>=0.115"
            - "sqlalchemy[asyncio]>=2.0"

    # ─── Commit message ───────────────────────────────────────────────────────
-   repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
    -   id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, test, chore, perf, revert, ci]
