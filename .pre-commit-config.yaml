---
default_language_version:
    python: python3.12
fail_fast: false
minimum_pre_commit_version: 3.7.1

repos:
  # ── chrysa/pre-commit-tools ───────────────────────────────────────────────
-   repo: https://github.com/chrysa/pre-commit-tools
    rev: 0.0.63
    hooks:
    -   id: console-debug-detection
    -   id: console-log-detection
    -   id: console-table-detection
    -   id: format-dockerfiles
    -   id: python-print-detection
    -   id: python-pprint-detection
    -   id: debugger-detection
    -   id: python-logger-detection
    -   id: yaml-sorter
        exclude: '^(\.pre-commit-config\.yaml|config-tools/|\.github/)'
    -   id: json-sorter
    -   id: requirements-sort
    -   id: env-file-check
  # ── chrysa/pre-commit-hooks-changelog ────────────────────────────────────
-   repo: https://github.com/chrysa/pre-commit-hooks-changelog
    rev: v0.1.4
    hooks:
    -   id: generate-changelog
        stages:
        -   manual
  # ── hadolint ─────────────────────────────────────────────────────────────
-   repo: https://github.com/hadolint/hadolint.git
    rev: v2.12.0
    hooks:
    -   id: hadolint-docker
        args: [--config=./config-tools/.hadolint.yaml]
  # ── ESLint ────────────────────────────────────────────────────────────────
-   repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.57.1
    hooks:
    -   id: eslint
        files: \.(js|ts|tsx)$
        args: [--config, code/.eslintrc.cjs]
        additional_dependencies:
        -   eslint@8.57.1
        -   typescript
        -   '@typescript-eslint/eslint-plugin'
        -   '@typescript-eslint/parser'
        -   eslint-config-prettier
  # ── CSSLint ───────────────────────────────────────────────────────────────
-   repo: https://github.com/pre-commit/mirrors-csslint
    rev: ad9b0d72db73272bae05948632f13b5cada6f3ef
    hooks:
    -   id: csslint
  # ── YAML lint & format ────────────────────────────────────────────────────
-   repo: https://github.com/adrienverge/yamllint.git
    rev: v1.32.0
    hooks:
    -   id: yamllint
        args: [--config-file, config-tools/.yamllint.yaml, --format, parsable, --strict]
-   repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
    rev: 0.2.3
    hooks:
    -   id: yamlfmt
        args: [--mapping, '4', --sequence, '4', --offset, '0', --colons, --width, '200']
  # ── Markdown ─────────────────────────────────────────────────────────────
-   repo: https://github.com/frnmst/md-toc
    rev: 8.1.9
    hooks:
    -   id: md-toc
        stages:
        -   manual
-   repo: https://github.com/smian/pre-commit-makefile.git
    rev: 261f8fb4b31dfdc05d1a1d7fbde1f1462ecde66d
    hooks:
    -   id: makefile-doc
        stages:
        -   manual
-   repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.35.0
    hooks:
    -   id: markdownlint
        args: [-c, config-tools/.markdownlint.yml, --fix]
-   repo: https://github.com/executablebooks/mdformat
    rev: 0.7.22
    hooks:
    -   id: mdformat
        additional_dependencies:
        -   mdformat-gfm
        -   mdformat-black
  # ── Shell ─────────────────────────────────────────────────────────────────
-   repo: https://github.com/lovesegfault/beautysh.git
    rev: v6.2.1
    hooks:
    -   id: beautysh
        args: [--indent-size, '4']
-   repo: https://github.com/openstack/bashate.git
    rev: f5426a8c83b429b7bae80d9004bdebc73ebe8137
    hooks:
    -   id: bashate
        args:
        -   --ignore=E006,E020
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: bb4e628bb475392bed0736990db6f33009bb8169
    hooks:
    -   id: check-json
    -   id: check-yaml
        args:
        -   --allow-multiple-documents
        files: .(yaml|yml)$
    -   id: check-case-conflict
    -   id: end-of-file-fixer
    -   id: mixed-line-ending
        args:
        -   --fix=lf
    -   id: pretty-format-json
        args:
        -   --indent=4
        -   --autofix
    -   id: trailing-whitespace
    -   id: check-merge-conflict
