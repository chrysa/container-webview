# ──────────────────────────────────────────────────────────────────────────────
# TEMPLATE — Ne PAS committer avec de vraies valeurs en clair.
# Utiliser Sealed Secrets, Vault, ou un Secret Manager externe en production.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: docker-overview-secret
  namespace: docker-overview
  labels:
    app.kubernetes.io/name: docker-overview
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-production"     # JWT signing key
  ADMIN_PASSWORD: "admin"                   # Mot de passe admin local
  LDAP_SERVER: ""                           # ldap://host:389  (optionnel)
  LDAP_BASE_DN: ""                          # dc=example,dc=com
  LDAP_BIND_DN: ""                          # cn=svc,dc=example,dc=com
  LDAP_BIND_PASSWORD: ""
