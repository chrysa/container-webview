---
# Middleware — Sécurité headers pour le frontend SPA
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
    name: secure-headers
    namespace: docker-overview
spec:
    headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        referrerPolicy: strict-origin-when-cross-origin
        customResponseHeaders:
            X-Powered-By: ''

---
# Middleware — Redirection HTTP → HTTPS (à activer si TLS configuré)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
    name: https-redirect
    namespace: docker-overview
spec:
    redirectScheme:
        scheme: https
        permanent: true
