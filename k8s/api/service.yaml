---
apiVersion: v1
kind: Service
metadata:
    name: docker-overview-api
    namespace: docker-overview
    labels:
        app.kubernetes.io/name: docker-overview
        app.kubernetes.io/component: api
spec:
    type: ClusterIP
    selector:
        app.kubernetes.io/name: docker-overview
        app.kubernetes.io/component: api
    ports:
    -   name: http
        port: 8000
        targetPort: http
        protocol: TCP
