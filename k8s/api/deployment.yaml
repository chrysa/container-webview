---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: docker-overview-api
    namespace: docker-overview
    labels:
        app.kubernetes.io/name: docker-overview
        app.kubernetes.io/component: api
spec:
    replicas: 1
  # NOTE : replicas > 1 ne fait sens que si le Docker socket est accessible
  # sur tous les nœuds cibles ET que le PVC est en RWX.
    selector:
        matchLabels:
            app.kubernetes.io/name: docker-overview
            app.kubernetes.io/component: api
    template:
        metadata:
            labels:
                app.kubernetes.io/name: docker-overview
                app.kubernetes.io/component: api
        spec:
      # ─── Sécurité du pod ────────────────────────────────────────────────────
            securityContext:
                runAsNonRoot: false  # false requis pour accéder au socket Docker
                runAsUser: 0
      # ─── Containers ─────────────────────────────────────────────────────────
            containers:
            -   name: api
                image: docker-overview-api:latest
                imagePullPolicy: IfNotPresent
                ports:
                -   name: http
                    containerPort: 8000
                    protocol: TCP
          # ─── Variables depuis ConfigMap + Secret ──────────────────────────
                env:
                -   name: PROJECTS_PATH
                    valueFrom:
                        configMapKeyRef:
                            name: docker-overview-config
                            key: PROJECTS_PATH
                -   name: ADMIN_USERNAME
                    valueFrom:
                        configMapKeyRef:
                            name: docker-overview-config
                            key: ADMIN_USERNAME
                -   name: SECRET_KEY
                    valueFrom:
                        secretKeyRef:
                            name: docker-overview-secret
                            key: SECRET_KEY
                -   name: ADMIN_PASSWORD
                    valueFrom:
                        secretKeyRef:
                            name: docker-overview-secret
                            key: ADMIN_PASSWORD
                -   name: LDAP_SERVER
                    valueFrom:
                        secretKeyRef:
                            name: docker-overview-secret
                            key: LDAP_SERVER
                -   name: LDAP_BASE_DN
                    valueFrom:
                        secretKeyRef:
                            name: docker-overview-secret
                            key: LDAP_BASE_DN
                -   name: LDAP_BIND_DN
                    valueFrom:
                        secretKeyRef:
                            name: docker-overview-secret
                            key: LDAP_BIND_DN
                -   name: LDAP_BIND_PASSWORD
                    valueFrom:
                        secretKeyRef:
                            name: docker-overview-secret
                            key: LDAP_BIND_PASSWORD
          # ─── Volumes ──────────────────────────────────────────────────────
                volumeMounts:
                -   name: docker-socket
                    mountPath: /var/run/docker.sock
                    readOnly: true
                -   name: projects
                    mountPath: /projects
                    readOnly: true
          # ─── Probes ───────────────────────────────────────────────────────
                livenessProbe:
                    httpGet:
                        path: /api
                        port: http
                    initialDelaySeconds: 15
                    periodSeconds: 30
                    failureThreshold: 3
                readinessProbe:
                    httpGet:
                        path: /api
                        port: http
                    initialDelaySeconds: 5
                    periodSeconds: 10
          # ─── Resources ────────────────────────────────────────────────────
                resources:
                    requests:
                        cpu: 100m
                        memory: 128Mi
                    limits:
                        cpu: 500m
                        memory: 512Mi
      # ─── Volumes ────────────────────────────────────────────────────────────
            volumes:
            -   name: docker-socket
                hostPath:
                    path: /var/run/docker.sock
                    type: Socket
            -   name: projects
                persistentVolumeClaim:
                    claimName: docker-overview-projects
      # ─── Tolérance nœud avec Docker socket ──────────────────────────────────
      # Si seuls certains nœuds ont le socket Docker exposé, ajouter un label
      # sur ces nœuds et dé-commenter :
      # nodeSelector:
      #   docker-socket: "true"
