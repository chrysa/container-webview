# ─────────────────────────────────────────────────────────────────────────────
# Development stack
#   api      : FastAPI + uvicorn --reload  (port 8000)
#   frontend : React / CRA dev server      (port 3000)
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── FastAPI backend ──────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: container-webview-api
    env_file: .env
    environment:
      PROJECTS_PATH: /projects
    ports:
      - "8000:8000"
    volumes:
      # Hot-reload: mount source code
      - ./api:/app
      # Docker socket so the API can inspect running containers
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount a local directory that holds your docker-compose projects
      - ${PROJECTS_PATH:-/tmp/projects}:/projects:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── React frontend (CRA dev server) ─────────────────────────────────────
  frontend:
    image: node:20-slim
    container_name: container-webview-frontend
    working_dir: /app
    env_file: .env
    environment:
      WATCHPACK_POLLING: "true"
      NODE_ENV: development
      PORT: "3000"
      REACT_APP_API_URL: "http://localhost:8000"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./code:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm start"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  frontend_node_modules:
