services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    container_name: container-webview-api
    env_file: .env
    environment:
      PROJECTS_PATH: /projects
    ports:
    - 8000:8000
    restart: unless-stopped
    volumes:
    - ${PROJECTS_PATH:-./data/projects}:/projects:ro
    - ./api:/app
    - /var/run/docker.sock:/var/run/docker.sock:ro
  api-test:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: test
    container_name: container-webview-api-test
    environment:
      ADMIN_PASSWORD: testpass
      ADMIN_USERNAME: testuser
      PROJECTS_PATH: /tmp/projects
      SECRET_KEY: test-secret-key-for-ci
    profiles:
    - test
    volumes:
    - ./api:/app
  frontend:
    command: sh -c "npm install --legacy-peer-deps && npm start"
    container_name: container-webview-frontend
    depends_on:
    - api
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: '3000'
      REACT_APP_API_URL: http://localhost:8000
      WATCHPACK_POLLING: 'true'
    image: node:20-slim
    ports:
    - ${FRONTEND_PORT:-3000}:3000
    restart: unless-stopped
    volumes:
    - ./code:/app
    - frontend_node_modules:/app/node_modules
    working_dir: /app
volumes:
  frontend_node_modules: null
