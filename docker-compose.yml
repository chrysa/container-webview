---
version : '3.8'

services:
    docker-overview-webui:
        build:
            context: .
        container_name: docker-overview-webui
        expose:
        -   80
        hostname: docker-overview-webui
        image: docker-overview-webui:0.0.2
        stdin_open: true
        tty: true
        volumes:
        -   source: /etc/localtime
            target: /etc/localtime
            type: bind
    docker-overview-webui-dev:
        # command: npm run start
        command: npm start
        container_name: docker-overview-webui-dev
        environment:
            WATCHPACK_POLLING: 'true'
            NODE_ENV: development
            PORT: 3000
        hostname: docker-overview-webui-dev
        image: docker-overview-webui:0.0.2
        ports:
        -   3000:3000
        stdin_open: true
        tty: true
        volumes:
        -   source: /etc/localtime
            target: /etc/localtime
            type: bind
        -   source: ./code
            target: /app
            type: bind
        -   source: docker-overview-node-modules
            target: /app/node_modules
            type: volume
        working_dir: /app

volumes :
    docker-overview-node-modules:
