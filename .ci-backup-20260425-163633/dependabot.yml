version: 2
updates:
  # ── Python (FastAPI backend) ──────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "backend"
    open-pull-requests-limit: 10
    groups:
      python-deps:
        patterns:
          - "*"

  # ── Node.js (React frontend) ──────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/code"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "frontend"
    open-pull-requests-limit: 10
    groups:
      npm-deps:
        patterns:
          - "*"

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci/cd"
    open-pull-requests-limit: 10

  # ── pre-commit hooks ──────────────────────────────────────────────────────
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "pre-commit"
    open-pull-requests-limit: 10
