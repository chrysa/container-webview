# ─────────────────────────────────────────────────────────────────────────────
# GitVersion configuration
# Docs: https://gitversion.net/docs/reference/configuration
#
# Strategy: Mainline (trunk-based) with conventional-commit bump rules.
#   feat:        → minor bump  (1.2.0 → 1.3.0)
#   fix / perf:  → patch bump  (1.2.0 → 1.2.1)
#   breaking (!): → major bump  (1.2.0 → 2.0.0)
#   docs / chore / style / test → no bump
# ─────────────────────────────────────────────────────────────────────────────

mode: Mainline
tag-prefix: "[vV]"
initial-version: "0.1.0"

major-version-bump-message: '^(feat|fix|refactor|perf|style|test|docs|build|ops|chore)(\(.+\))?!:'
minor-version-bump-message: '^feat(\(.+\))?[^!]?:'
patch-version-bump-message: '^(fix|perf|refactor)(\(.+\))?[^!]?:'
no-bump-message: '^(docs?|style|test|chore)(\(.+\))?:'

branches:
  main:
    regex: "^main$"
    mode: Mainline
    increment: Inherit
    is-main-branch: true
    prevent-increment-of-merged-branch-version: false
    track-merge-target: false

  feature:
    regex: "^(feature|feat)[\\/\\-]"
    mode: ContinuousDeployment
    increment: Inherit
    is-main-branch: false
    tag: "{BranchName}"

  pull-request:
    regex: "^(pull-request|pr)[\\/\\-]"
    mode: ContinuousDeployment
    increment: Inherit
    is-main-branch: false
    tag: "PullRequest{}"
