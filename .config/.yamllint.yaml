---
# yamllint configuration
# https://yamllint.readthedocs.io/en/stable/configuration.html

extends: default

rules:
    braces:
        level: error
        max-spaces-inside: 1
        max-spaces-inside-empty: 0
    brackets:
        level: error
        max-spaces-inside: 1
        max-spaces-inside-empty: 0
    colons:
        level: error
        max-spaces-after: 1
        max-spaces-before: 0
    commas:
        level: error
        max-spaces-after: 1
        max-spaces-before: 0
    comments:
        level: warning
        min-spaces-from-content: 2
    comments-indentation: disable
    document-end: disable
    document-start: disable
    empty-lines:
        level: error
        max: 2
    line-length:
        level: warning
        max: 120
