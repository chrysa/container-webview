---
# markdownlint configuration
# https://github.com/DavidAnson/markdownlint

# Defaults: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# Allow inline HTML
MD033: false

# Allow duplicate headings in different sections
MD024:
    siblings_only: true

# Line length
MD013:
    line_length: 120
    tables: false
    code_blocks: false
